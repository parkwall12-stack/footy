<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ember Village — Homebase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#1c1640; --sky-2:#2b2150; --sky-3:#4a2f5e;
    --moon:#f5e9c9; --lantern:#ffae42; --glow:#ffd97a;
    --roof:#b03a3a; --roof-dark:#7e2727; --wood:#7a4a2b; --wood-dark:#5a3520;
    --grass:#2e6b4f; --grass-dark:#1f4a37; --path:#c9a26b; --path-dark:#a8855a;
    --ink:#0e0b22; --paper:#f0e6d2;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--sky-1);
    font-family:'VT323',monospace;
    color:var(--paper);
    display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;
  }
  header{
    text-align:center;padding:22px 16px 8px;
  }
  h1{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(14px,3vw,24px);
    color:var(--glow);
    text-shadow:3px 3px 0 var(--ink);
    letter-spacing:1px;
  }
  .sub{font-size:clamp(16px,2.2vw,22px);color:#b9aee0;margin-top:8px}
  .scene-wrap{
    width:min(1100px,96vw);
    margin:10px auto 6px;
    border:4px solid var(--ink);
    box-shadow:0 0 0 4px #3a2f6b, 8px 8px 0 var(--ink);
    background:var(--sky-2);
  }
  svg{display:block;width:100%;height:auto;shape-rendering:crispEdges}
  .building{cursor:pointer}
  .building .label{opacity:0;transition:opacity .12s steps(2)}
  .building:hover .label,.building:focus .label{opacity:1}
  .building:hover .hl,.building:focus .hl{opacity:.35}
  .building:focus{outline:none}
  .hl{opacity:0;transition:opacity .12s steps(2)}
  .win{animation:flicker 2.4s steps(2) infinite}
  .win.w2{animation-delay:1.1s}
  @keyframes flicker{0%,92%{fill:var(--glow)}93%,100%{fill:#d8a83f}}
  @media (prefers-reduced-motion:reduce){.win{animation:none}}
  footer{
    padding:10px 16px 26px;text-align:center;
    font-size:clamp(15px,2vw,20px);color:#8d82bd;
  }
  footer b{color:var(--glow)}
</style>
</head>
<body>
<header>
  <h1>EMBER VILLAGE</h1>
  <div class="sub">your homebase — click a building to enter</div>
</header>

<div class="scene-wrap">
<svg viewBox="0 0 320 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pixel village map">
  <!-- sky bands -->
  <rect x="0" y="0" width="320" height="60" fill="var(--sky-1)"/>
  <rect x="0" y="60" width="320" height="35" fill="var(--sky-2)"/>
  <rect x="0" y="95" width="320" height="25" fill="var(--sky-3)"/>

  <!-- moon -->
  <rect x="262" y="14" width="22" height="22" fill="var(--moon)"/>
  <rect x="260" y="16" width="26" height="18" fill="var(--moon)"/>
  <rect x="266" y="12" width="14" height="26" fill="var(--moon)"/>
  <rect x="268" y="20" width="4" height="4" fill="#dccfa8"/>
  <rect x="276" y="28" width="3" height="3" fill="#dccfa8"/>

  <!-- stars -->
  <rect x="20" y="12" width="2" height="2" fill="#cfc4f2"/>
  <rect x="60" y="30" width="2" height="2" fill="#cfc4f2"/>
  <rect x="105" y="10" width="2" height="2" fill="#cfc4f2"/>
  <rect x="150" y="24" width="2" height="2" fill="#cfc4f2"/>
  <rect x="200" y="14" width="2" height="2" fill="#cfc4f2"/>
  <rect x="235" y="40" width="2" height="2" fill="#cfc4f2"/>
  <rect x="40" y="48" width="2" height="2" fill="#9a8ed0"/>
  <rect x="180" y="44" width="2" height="2" fill="#9a8ed0"/>

  <!-- mountains -->
  <polygon points="0,120 40,70 80,120" fill="#241c4a"/>
  <polygon points="50,120 100,60 150,120" fill="#2e2458"/>
  <polygon points="120,120 170,75 220,120" fill="#241c4a"/>
  <polygon points="200,120 260,65 320,120" fill="#2e2458"/>

  <!-- ground -->
  <rect x="0" y="120" width="320" height="70" fill="var(--grass)"/>
  <rect x="0" y="120" width="320" height="4" fill="var(--grass-dark)"/>
  <rect x="14" y="140" width="6" height="3" fill="var(--grass-dark)"/>
  <rect x="290" y="150" width="6" height="3" fill="var(--grass-dark)"/>
  <rect x="40" y="170" width="6" height="3" fill="var(--grass-dark)"/>
  <rect x="250" y="176" width="6" height="3" fill="var(--grass-dark)"/>

  <!-- path -->
  <polygon points="140,190 180,190 168,120 152,120" fill="var(--path)"/>
  <rect x="60" y="146" width="96" height="8" fill="var(--path)"/>
  <rect x="168" y="146" width="100" height="8" fill="var(--path)"/>
  <rect x="150" y="156" width="8" height="4" fill="var(--path-dark)"/>
  <rect x="166" y="170" width="8" height="4" fill="var(--path-dark)"/>
  <rect x="90" y="148" width="8" height="3" fill="var(--path-dark)"/>
  <rect x="220" y="148" width="8" height="3" fill="var(--path-dark)"/>

  <!-- torii-style gate over path -->
  <rect x="146" y="96" width="4" height="26" fill="var(--roof-dark)"/>
  <rect x="170" y="96" width="4" height="26" fill="var(--roof-dark)"/>
  <rect x="140" y="92" width="40" height="5" fill="var(--roof)"/>
  <rect x="144" y="100" width="32" height="3" fill="var(--roof)"/>

  <!-- trees -->
  <g>
    <rect x="22" y="116" width="5" height="10" fill="var(--wood-dark)"/>
    <rect x="14" y="98" width="21" height="18" fill="#1f5a40"/>
    <rect x="18" y="92" width="13" height="8" fill="#1f5a40"/>
    <rect x="16" y="102" width="4" height="4" fill="#2e6b4f"/>
  </g>
  <g>
    <rect x="296" y="118" width="5" height="10" fill="var(--wood-dark)"/>
    <rect x="288" y="100" width="21" height="18" fill="#1f5a40"/>
    <rect x="292" y="94" width="13" height="8" fill="#1f5a40"/>
  </g>

  <!-- ============ RAMEN SHOP (calorie tracker) ============ -->
  <a href="apps/ramen.html" class="building" aria-label="Ramen Shop — calorie tracker">
  <g>
    <rect x="34" y="104" width="58" height="44" fill="var(--wood)"/>
    <rect x="34" y="104" width="58" height="4" fill="var(--wood-dark)"/>
    <!-- roof -->
    <rect x="28" y="92" width="70" height="12" fill="var(--roof)"/>
    <rect x="28" y="100" width="70" height="4" fill="var(--roof-dark)"/>
    <rect x="36" y="86" width="54" height="8" fill="var(--roof)"/>
    <!-- noren curtain -->
    <rect x="40" y="110" width="46" height="10" fill="#b03a3a"/>
    <rect x="48" y="110" width="3" height="10" fill="#8e2c2c"/>
    <rect x="62" y="110" width="3" height="10" fill="#8e2c2c"/>
    <rect x="76" y="110" width="3" height="10" fill="#8e2c2c"/>
    <!-- door + windows -->
    <rect x="56" y="124" width="14" height="24" fill="var(--wood-dark)"/>
    <rect class="win" x="40" y="126" width="10" height="9" fill="var(--glow)"/>
    <rect class="win w2" x="76" y="126" width="10" height="9" fill="var(--glow)"/>
    <!-- lantern -->
    <rect x="92" y="108" width="2" height="6" fill="var(--wood-dark)"/>
    <rect class="win" x="89" y="114" width="8" height="10" fill="var(--lantern)"/>
    <!-- bowl sign -->
    <rect x="52" y="76" width="22" height="9" fill="var(--paper)"/>
    <rect x="55" y="78" width="16" height="3" fill="#b03a3a"/>
    <rect x="58" y="74" width="2" height="3" fill="#d8d0bd"/>
    <rect x="63" y="73" width="2" height="4" fill="#d8d0bd"/>
    <rect x="68" y="74" width="2" height="3" fill="#d8d0bd"/>
    <!-- hover highlight + label -->
    <rect class="hl" x="26" y="72" width="74" height="80" fill="var(--glow)"/>
    <g class="label">
      <rect x="24" y="56" width="80" height="13" fill="var(--ink)"/>
      <text x="64" y="66" text-anchor="middle" font-family="'Press Start 2P',monospace" font-size="6" fill="var(--glow)">RAMEN SHOP</text>
    </g>
  </g>
  </a>

  <!-- ============ TOWN HALL (subscriptions) ============ -->
  <a href="apps/townhall.html" class="building" aria-label="Town Hall — money and subscriptions">
  <g>
    <rect x="124" y="58" width="72" height="34" fill="#8a5a33"/>
    <rect x="118" y="50" width="84" height="10" fill="var(--roof)"/>
    <rect x="118" y="56" width="84" height="3" fill="var(--roof-dark)"/>
    <rect x="130" y="42" width="60" height="10" fill="var(--roof)"/>
    <rect x="146" y="34" width="28" height="10" fill="var(--roof)"/>
    <!-- body below gate level: sits behind gate visually, fine -->
    <rect x="124" y="58" width="72" height="4" fill="#6e4527"/>
    <rect class="win" x="132" y="66" width="10" height="10" fill="var(--glow)"/>
    <rect class="win w2" x="155" y="66" width="10" height="10" fill="var(--glow)"/>
    <rect class="win" x="178" y="66" width="10" height="10" fill="var(--glow)"/>
    <!-- crest -->
    <rect x="154" y="36" width="12" height="6" fill="var(--glow)"/>
    <!-- hover -->
    <rect class="hl" x="116" y="32" width="88" height="62" fill="var(--glow)"/>
    <g class="label">
      <rect x="116" y="16" width="88" height="13" fill="var(--ink)"/>
      <text x="160" y="26" text-anchor="middle" font-family="'Press Start 2P',monospace" font-size="6" fill="var(--glow)">TOWN HALL</text>
    </g>
  </g>
  </a>

  <!-- ============ CLIP STUDIO (tiktok clipper - coming soon) ============ -->
  <a href="apps/studio.html" class="building" aria-label="Clip Studio — coming soon">
  <g>
    <rect x="222" y="110" width="52" height="38" fill="#4e5a8a"/>
    <rect x="222" y="110" width="52" height="4" fill="#3a4570"/>
    <rect x="216" y="100" width="64" height="10" fill="#2f3a64"/>
    <!-- antenna -->
    <rect x="246" y="82" width="3" height="18" fill="#9aa6d8"/>
    <rect class="win" x="244" y="78" width="7" height="5" fill="#ff5e7a"/>
    <!-- door + screen-window -->
    <rect x="240" y="126" width="14" height="22" fill="#26305a"/>
    <rect class="win w2" x="226" y="118" width="11" height="9" fill="#7ad9ff"/>
    <rect class="win" x="259" y="118" width="11" height="9" fill="#7ad9ff"/>
    <!-- play sign -->
    <rect x="238" y="92" width="20" height="9" fill="var(--paper)"/>
    <polygon points="245,93.5 245,99.5 252,96.5" fill="#26305a"/>
    <!-- hover -->
    <rect class="hl" x="214" y="76" width="68" height="74" fill="var(--glow)"/>
    <g class="label">
      <rect x="208" y="60" width="84" height="13" fill="var(--ink)"/>
      <text x="250" y="70" text-anchor="middle" font-family="'Press Start 2P',monospace" font-size="6" fill="var(--glow)">CLIP STUDIO</text>
    </g>
  </g>
  </a>

  <!-- empty lot sign (future building) -->
  <g>
    <rect x="112" y="160" width="3" height="12" fill="var(--wood-dark)"/>
    <rect x="102" y="152" width="24" height="10" fill="var(--paper)"/>
    <text x="114" y="159" text-anchor="middle" font-family="'Press Start 2P',monospace" font-size="4" fill="var(--ink)">4 SALE</text>
  </g>
</svg>
</div>

<footer>
  data saves in your browser (localStorage) · add a building = drop a page in <b>/apps</b> and link it on the map
</footer>
</body>
</html>
